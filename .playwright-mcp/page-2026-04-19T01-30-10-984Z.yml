    - generic [ref=e8]: "This knowledge base appears to be a guide for a conversational AI system, specifically a Proof of Concept (PoC) implementation. The PoC aims to demonstrate the feasibility of using natural language queries to retrieve answers from a company's knowledge base, which is stored in Supabase, a database service.The documentation outlines three inexpensive and low-friction proof-of-concept projects: 1. **RAG Knowledge Base**: This project focuses on demonstrating that natural-language queries return grounded, source-cited answers — not hallucinations.2. **PoC 3 — Customer-Facing Conversational AI**: This project aims to create a live chat widget embedded on a webpage, where the agent answers questions grounded in both static docs (RAG) and live API data (inventory / order status). 3. **PoC 1 — RAG Knowledge Base** is mentioned again as it serves as part of the foundational PoCsThe documentation covers the setup for these projects, including setting up Supabase, defining functions for the agent to call, and implementing the chat UI."
